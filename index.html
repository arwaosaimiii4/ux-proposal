<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>عرض تدقيق UX — أروى العصيمي</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Cairo', sans-serif; background: #0E1117; }
    input::placeholder { color: #4A5568; }
    input:focus { border-color: rgba(184,150,46,0.5) !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    emailjs.init("qvI3a004Gj0pFdS0E");

    const designer = {
      name: "Arwa Alousaimi",
      title: "UI/UX Designer · Mobile Apps",
      bio: "متخصصة في تدقيق تجربة المستخدم لتطبيقات الجوال — أحوّل مشاكل الواجهات إلى فرص نمو حقيقية من خلال تحليل دقيق وتوصيات قابلة للتنفيذ.",
      phone: "0500390092",
      email: "arwaosaimi@hotmail.com",
      whatsapp: "966500390092",
    };

    const packages = [
      {
        id: "basic", name: "تدقيق أساسي", price: 800, duration: "3–4 أيام عمل",
        icon: "🔍", accent: "#6B84A3",
        description: "مثالي للتطبيقات الصغيرة أو من يريد نظرة سريعة وواضحة",
        features: ["مراجعة حتى 10 شاشات","تقرير PDF مفصّل","تحديد المشاكل الحرجة","توصيات عامة بالأولويات","راوند تعديل واحد"],
        missing: ["Wireframes مقترحة", "جلسة شرح مباشرة"],
      },
      {
        id: "standard", name: "تدقيق شامل", price: 1500, duration: "5–7 أيام عمل",
        icon: "🎯", accent: "#B8962E", badge: "الأكثر طلباً",
        description: "الخيار الأمثل لمعظم التطبيقات — تحليل عميق مع حلول مقترحة",
        features: ["مراجعة حتى 25 شاشة","تقرير PDF + Presentation كاملة","تحليل User Flow","Heuristic Evaluation","Wireframes للمشاكل الرئيسية","جلسة شرح 30 دقيقة","راوندان للتعديل"],
        missing: [],
      },
      {
        id: "premium", name: "تدقيق متكامل", price: 2800, duration: "10–14 يوم عمل",
        icon: "⭐", accent: "#8B7355",
        description: "للمنتجات الجادة — تحليل شامل من كل الزوايا مع متابعة ما بعد التسليم",
        features: ["شاشات غير محدودة","تقرير + Presentation احترافية","تحليل منافسين UX","User Flow + Journey Map","Wireframes لجميع المشاكل","Usability Score موثّق","جلستا شرح (قبل وبعد)","3 راوندات تعديل","متابعة لمدة شهر بعد التسليم"],
        missing: [],
      },
    ];

    const addons = [
      { id: "urgent",    label: "تسليم عاجل (نصف المدة)",  price: 300, icon: "⚡" },
      { id: "bilingual", label: "تقرير عربي + إنجليزي",     price: 200, icon: "🌐" },
      { id: "video",     label: "تسجيل فيديو للملاحظات",    price: 250, icon: "🎥" },
      { id: "followup",  label: "متابعة شهرية بعد التسليم", price: 400, icon: "📅" },
    ];

    const inputStyle = (hasError) => ({
      width: "100%",
      background: "rgba(255,255,255,0.02)",
      border: `1px solid ${hasError ? "rgba(220,50,50,0.5)" : "rgba(255,255,255,0.07)"}`,
      borderRadius: 9, padding: "14px 18px",
      color: "#CBD5E0", fontSize: 14,
      fontFamily: "'Cairo', sans-serif",
      outline: "none", boxSizing: "border-box",
    });

    const labelStyle = {
      fontSize: 11, color: "#3D4F61", marginBottom: 10,
      letterSpacing: "0.1em", textTransform: "uppercase",
      display: "flex", alignItems: "center", gap: 4,
    };

    const errMsg = (msg) => (
      <div style={{ color: "#FC8181", fontSize: 11, marginTop: 5 }}>{msg}</div>
    );

    function Proposal() {
      const [selected, setSelected]         = useState(null);
      const [activeAddons, setActiveAddons] = useState([]);
      const [submitted, setSubmitted]       = useState(false);
      const [clientName, setClientName]     = useState("");
      const [clientPhone, setClientPhone]   = useState("");
      const [clientEmail, setClientEmail]   = useState("");
      const [showContact, setShowContact]   = useState(false);
      const [sending, setSending]           = useState(false);
      const [emailError, setEmailError]     = useState(false);
      const [showValidation, setShowValidation] = useState(false);

      const pkg = packages.find((p) => p.id === selected);
      const addonsTotal = activeAddons.reduce((s, id) => {
        const a = addons.find((x) => x.id === id);
        return s + (a?.price || 0);
      }, 0);
      const total = (pkg?.price || 0) + addonsTotal;

      const phoneValid = clientPhone.trim().length >= 9;
      const emailValid = clientEmail.trim().length >= 5 && clientEmail.includes("@");
      const canSubmit  = selected && clientName.trim() && phoneValid && emailValid && !sending;

      const toggleAddon = (id) =>
        setActiveAddons((prev) =>
          prev.includes(id) ? prev.filter((x) => x !== id) : [...prev, id]
        );

      const handleSubmit = async () => {
        setShowValidation(true);
        if (!canSubmit) return;
        setSending(true);
        setEmailError(false);

        const addonNames = activeAddons.length > 0
          ? activeAddons.map((id) => addons.find((a) => a.id === id)?.label).join("، ")
          : "لا توجد إضافات";

        try {
          await emailjs.send("service_h8v9v6c", "template_psf118q", {
            client_name:  clientName,
            client_phone: clientPhone,
            client_email: clientEmail,
            package_name: pkg?.name,
            total:        total.toLocaleString(),
            addons:       addonNames,
          });
          setSubmitted(true);
        } catch (err) {
          setEmailError(true);
        } finally {
          setSending(false);
        }
      };

      const buildWhatsApp = () => {
        const addonNames = activeAddons.map((id) => addons.find((a) => a.id === id)?.label).join("، ");
        const msg = `مرحباً ${designer.name} 👋\nاطلعت على عرضك وأبغى أتواصل معك بخصوص:\n\n📦 الباقة: ${pkg?.name}\n💰 الإجمالي: ${total.toLocaleString()} ريال\n${addonNames ? `➕ الإضافات: ${addonNames}\n` : ""}📱 رقمي: ${clientPhone}\n✉️ إيميلي: ${clientEmail}\nاسمي: ${clientName}`;
        return `https://wa.me/${designer.whatsapp}?text=${encodeURIComponent(msg)}`;
      };

      const resetForm = () => {
        setSubmitted(false); setSelected(null); setActiveAddons([]);
        setClientName(""); setClientPhone(""); setClientEmail("");
        setShowValidation(false);
      };

      /* ── صفحة الشكر ── */
      if (submitted) {
        return (
          <div dir="rtl" style={{
            minHeight: "100vh",
            background: "linear-gradient(160deg, #0E1117, #141A24)",
            display: "flex", alignItems: "center", justifyContent: "center",
            fontFamily: "'Cairo', sans-serif", padding: 24,
          }}>
            <div style={{
              background: "rgba(184,150,46,0.05)",
              border: "1px solid rgba(184,150,46,0.22)",
              borderRadius: 24, padding: "56px 40px",
              textAlign: "center", maxWidth: 480, width: "100%",
            }}>
              <div style={{ color: "#B8962E", fontSize: 36, marginBottom: 20 }}>✦</div>
              <h2 style={{ color: "#E8DFC8", fontSize: 24, fontWeight: 900, marginBottom: 12 }}>
                شكراً {clientName}
              </h2>
              <p style={{ color: "#5A6A7D", fontSize: 14, lineHeight: 2, marginBottom: 32 }}>
                تم استلام طلبك — سيتواصل معك {designer.name} خلال 24 ساعة.
              </p>
              <div style={{
                background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)",
                borderRadius: 12, padding: "20px 24px", marginBottom: 28, textAlign: "right",
              }}>
                <div style={{ color: "#3D4F61", fontSize: 10, letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 10 }}>ملخص الطلب</div>
                <div style={{ color: "#CBD5E0", fontWeight: 700, fontSize: 15, marginBottom: 4 }}>{pkg?.name}</div>
                {activeAddons.length > 0 && (
                  <div style={{ color: "#5A6A7D", fontSize: 13, marginBottom: 8 }}>
                    + {activeAddons.map((id) => addons.find((a) => a.id === id)?.label).join("، ")}
                  </div>
                )}
                <div style={{ color: "#B8962E", fontWeight: 900, fontSize: 28, marginTop: 10 }}>
                  {total.toLocaleString()} <span style={{ fontSize: 13, fontWeight: 600 }}>ريال</span>
                </div>
              </div>
              <a href={buildWhatsApp()} target="_blank" rel="noreferrer" style={{
                display: "block", background: "linear-gradient(135deg, #1da851, #25D366)",
                color: "#fff", borderRadius: 10, padding: "15px",
                fontWeight: 700, fontSize: 14, textDecoration: "none",
                letterSpacing: "0.02em", marginBottom: 12,
              }}>
                التواصل عبر واتساب
              </a>
              <button onClick={resetForm} style={{
                background: "transparent", border: "1px solid rgba(255,255,255,0.07)",
                color: "#4A5568", borderRadius: 10, padding: "12px",
                fontWeight: 600, fontSize: 13, cursor: "pointer",
                fontFamily: "'Cairo', sans-serif", width: "100%",
              }}>
                تقديم طلب آخر
              </button>
            </div>
          </div>
        );
      }

      /* ── الصفحة الرئيسية ── */
      return (
        <div dir="rtl" style={{
          minHeight: "100vh",
          background: "linear-gradient(160deg, #0E1117 0%, #111520 50%, #0E1117 100%)",
          fontFamily: "'Cairo', sans-serif", color: "#E2E8F0", padding: "0 0 80px",
        }}>

          {/* Hero */}
          <div style={{
            background: "linear-gradient(180deg, rgba(184,150,46,0.06) 0%, transparent 100%)",
            borderBottom: "1px solid rgba(255,255,255,0.05)",
            padding: "60px 24px 44px", textAlign: "center",
          }}>
            <div style={{ width: 48, height: 1, background: "linear-gradient(90deg, transparent, #B8962E, transparent)", margin: "0 auto 26px" }} />
            <div style={{ color: "#B8962E", fontSize: 10, letterSpacing: "0.22em", fontWeight: 700, marginBottom: 16, textTransform: "uppercase" }}>
              عرض خدمات احترافي
            </div>
            <h1 style={{ fontSize: 26, fontWeight: 900, marginBottom: 8, color: "#EDE8D8" }}>{designer.name}</h1>
            <div style={{ color: "#4A6785", fontSize: 13, fontWeight: 600, marginBottom: 20, letterSpacing: "0.06em" }}>{designer.title}</div>
            <p style={{ color: "#4A5568", fontSize: 14, lineHeight: 2, maxWidth: 500, margin: "0 auto 30px" }}>{designer.bio}</p>
            <button onClick={() => setShowContact(!showContact)} style={{
              background: "transparent", border: "1px solid rgba(184,150,46,0.3)",
              color: "#B8962E", borderRadius: 7, padding: "9px 24px",
              fontSize: 12, fontWeight: 700, cursor: "pointer",
              fontFamily: "'Cairo', sans-serif", letterSpacing: "0.04em",
            }}>
              {showContact ? "إخفاء بيانات التواصل" : "بيانات التواصل"}
            </button>
            {showContact && (
              <div style={{ marginTop: 18, display: "flex", justifyContent: "center", gap: 12, flexWrap: "wrap" }}>
                {[{ icon: "📞", val: designer.phone }, { icon: "✉️", val: designer.email }].map((c) => (
                  <div key={c.val} style={{
                    background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.07)",
                    borderRadius: 7, padding: "8px 18px", fontSize: 13, color: "#6B7A8D",
                    display: "flex", gap: 8, alignItems: "center",
                  }}>
                    {c.icon} {c.val}
                  </div>
                ))}
              </div>
            )}
            <div style={{ width: 48, height: 1, background: "linear-gradient(90deg, transparent, rgba(184,150,46,0.25), transparent)", margin: "28px auto 0" }} />
          </div>

          <div style={{ maxWidth: 920, margin: "0 auto", padding: "0 20px" }}>

            {/* Section title */}
            <div style={{ textAlign: "center", padding: "44px 0 28px" }}>
              <h2 style={{ fontSize: 18, fontWeight: 800, margin: "0 0 8px", color: "#A0AEC0", letterSpacing: "0.04em" }}>الباقات المتاحة</h2>
              <p style={{ color: "#2D3748", fontSize: 11, margin: 0, letterSpacing: "0.08em" }}>جميع الباقات تشمل · NDA · فاتورة رسمية · حقوق الملكية الكاملة</p>
            </div>

            {/* Packages */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(265px, 1fr))", gap: 16, marginBottom: 32 }}>
              {packages.map((p) => (
                <div key={p.id} onClick={() => setSelected(p.id)} style={{
                  position: "relative",
                  background: selected === p.id ? "rgba(255,255,255,0.04)" : "rgba(255,255,255,0.02)",
                  border: `1px solid ${selected === p.id ? p.accent : "rgba(255,255,255,0.06)"}`,
                  borderRadius: 14, padding: "28px 24px", cursor: "pointer",
                  transition: "all 0.25s ease",
                  transform: selected === p.id ? "translateY(-4px)" : "none",
                  boxShadow: selected === p.id ? "0 24px 48px rgba(0,0,0,0.5)" : "none",
                }}>
                  {p.badge && (
                    <div style={{
                      position: "absolute", top: -10, right: 20,
                      background: "#B8962E", color: "#0E1117",
                      fontSize: 10, fontWeight: 800,
                      padding: "3px 14px", borderRadius: 100, letterSpacing: "0.06em",
                    }}>{p.badge}</div>
                  )}
                  {selected === p.id && (
                    <div style={{
                      position: "absolute", top: 16, left: 18,
                      width: 18, height: 18, borderRadius: "50%",
                      background: p.accent,
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontSize: 9, color: "#0E1117", fontWeight: 900,
                    }}>✓</div>
                  )}
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 16 }}>
                    <div>
                      <div style={{ fontSize: 20, marginBottom: 8 }}>{p.icon}</div>
                      <div style={{ fontSize: 16, fontWeight: 800, color: "#CBD5E0" }}>{p.name}</div>
                      <div style={{ fontSize: 11, color: "#3D4F61", marginTop: 5, lineHeight: 1.7 }}>{p.description}</div>
                    </div>
                    <div style={{ textAlign: "left", flexShrink: 0, marginRight: 10 }}>
                      <div style={{ fontSize: 28, fontWeight: 900, color: p.accent, lineHeight: 1 }}>{p.price.toLocaleString()}</div>
                      <div style={{ fontSize: 10, color: "#3D4F61", marginTop: 3 }}>ريال</div>
                    </div>
                  </div>
                  <div style={{
                    display: "inline-block", fontSize: 10, color: p.accent,
                    background: `${p.accent}10`, border: `1px solid ${p.accent}20`,
                    padding: "3px 12px", borderRadius: 5, marginBottom: 16,
                  }}>⏱ {p.duration}</div>
                  <div style={{ height: 1, background: "rgba(255,255,255,0.04)", marginBottom: 14 }} />
                  <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
                    {p.features.map((f, i) => (
                      <div key={i} style={{ display: "flex", gap: 10, fontSize: 12, color: "#718096", alignItems: "flex-start" }}>
                        <span style={{ color: p.accent, marginTop: 2, flexShrink: 0, fontSize: 8 }}>◆</span>{f}
                      </div>
                    ))}
                    {p.missing.map((f, i) => (
                      <div key={i} style={{ display: "flex", gap: 10, fontSize: 12, color: "#2D3748", alignItems: "flex-start" }}>
                        <span style={{ marginTop: 2, flexShrink: 0, fontSize: 8 }}>◇</span>{f}
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>

            {/* Add-ons */}
            <div style={{ marginBottom: 32 }}>
              <div style={{ fontSize: 11, fontWeight: 700, marginBottom: 14, color: "#3D4F61", letterSpacing: "0.12em", textTransform: "uppercase" }}>
                إضافات اختيارية
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(210px, 1fr))", gap: 10 }}>
                {addons.map((a) => {
                  const on = activeAddons.includes(a.id);
                  return (
                    <div key={a.id} onClick={() => toggleAddon(a.id)} style={{
                      background: on ? "rgba(184,150,46,0.06)" : "rgba(255,255,255,0.02)",
                      border: `1px solid ${on ? "rgba(184,150,46,0.35)" : "rgba(255,255,255,0.05)"}`,
                      borderRadius: 9, padding: "12px 16px", cursor: "pointer",
                      display: "flex", justifyContent: "space-between", alignItems: "center",
                      transition: "all 0.2s",
                    }}>
                      <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                        <span style={{ fontSize: 14 }}>{a.icon}</span>
                        <span style={{ fontSize: 12, color: on ? "#A0AEC0" : "#4A5568" }}>{a.label}</span>
                      </div>
                      <span style={{ fontSize: 12, fontWeight: 700, color: on ? "#B8962E" : "#2D3748" }}>+{a.price}</span>
                    </div>
                  );
                })}
              </div>
            </div>

            <div style={{ height: 1, background: "linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent)", marginBottom: 28 }} />

            {/* ── حقول العميل ── */}
            {/* الاسم — سطر كامل */}
            <div style={{ marginBottom: 14 }}>
              <div style={labelStyle}>
                الاسم الكريم <span style={{ color: "#FC8181", fontSize: 14 }}>*</span>
              </div>
              <input
                value={clientName}
                onChange={(e) => setClientName(e.target.value)}
                placeholder="مثال: محمد العتيبي"
                style={inputStyle(showValidation && !clientName.trim())}
              />
              {showValidation && !clientName.trim() && errMsg("يرجى إدخال الاسم")}
            </div>

            {/* الجوال والإيميل — جنب بعض */}
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 16 }}>
              <div>
                <div style={labelStyle}>
                  رقم الجوال <span style={{ color: "#FC8181", fontSize: 14 }}>*</span>
                </div>
                <input
                  value={clientPhone}
                  onChange={(e) => setClientPhone(e.target.value)}
                  placeholder="مثال: 0501234567"
                  type="tel"
                  style={inputStyle(showValidation && !phoneValid)}
                />
                {showValidation && !phoneValid && errMsg("يرجى إدخال رقم صحيح")}
              </div>
              <div>
                <div style={labelStyle}>
                  الإيميل <span style={{ color: "#FC8181", fontSize: 14 }}>*</span>
                </div>
                <input
                  value={clientEmail}
                  onChange={(e) => setClientEmail(e.target.value)}
                  placeholder="مثال: name@email.com"
                  type="email"
                  style={inputStyle(showValidation && !emailValid)}
                />
                {showValidation && !emailValid && errMsg("يرجى إدخال إيميل صحيح")}
              </div>
            </div>

            {/* رسالة الباقة */}
            {showValidation && !selected && (
              <div style={{
                background: "rgba(220,50,50,0.07)", border: "1px solid rgba(220,50,50,0.2)",
                borderRadius: 9, padding: "12px 18px",
                color: "#FC8181", fontSize: 13, marginBottom: 16, textAlign: "center",
              }}>
                يرجى اختيار باقة أولاً 👆
              </div>
            )}

            {/* خطأ الإرسال */}
            {emailError && (
              <div style={{
                background: "rgba(220,50,50,0.07)", border: "1px solid rgba(220,50,50,0.2)",
                borderRadius: 9, padding: "12px 18px",
                color: "#FC8181", fontSize: 13, marginBottom: 16, textAlign: "center",
              }}>
                حدث خطأ أثناء الإرسال، حاولي مرة ثانية
              </div>
            )}

            {/* Total + CTA */}
            <div style={{
              background: "linear-gradient(135deg, rgba(184,150,46,0.06), rgba(14,17,23,0.6))",
              border: "1px solid rgba(184,150,46,0.18)",
              borderRadius: 14, padding: "28px 32px",
              display: "flex", justifyContent: "space-between", alignItems: "center",
              flexWrap: "wrap", gap: 24,
            }}>
              <div>
                <div style={{ color: "#2D3748", fontSize: 11, marginBottom: 6, letterSpacing: "0.08em", textTransform: "uppercase" }}>
                  {selected ? `${pkg?.name}${activeAddons.length ? ` · ${activeAddons.length} إضافة` : ""}` : "لم يتم اختيار باقة"}
                </div>
                <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
                  <span style={{ fontSize: 46, fontWeight: 900, color: selected ? "#B8962E" : "#1A2332", lineHeight: 1 }}>
                    {selected ? total.toLocaleString() : "—"}
                  </span>
                  {selected && <span style={{ color: "#4A5568", fontSize: 14, fontWeight: 600 }}>ريال</span>}
                </div>
              </div>
              <button onClick={handleSubmit} style={{
                background: canSubmit ? "linear-gradient(135deg, #9A7A24, #C4A030)" : "rgba(255,255,255,0.03)",
                color: canSubmit ? "#0E1117" : "#2D3748",
                border: "none", borderRadius: 9, padding: "16px 42px",
                fontWeight: 800, fontSize: 14, cursor: "pointer",
                fontFamily: "'Cairo', sans-serif", letterSpacing: "0.04em",
                boxShadow: canSubmit ? "0 8px 28px rgba(184,150,46,0.2)" : "none",
                transition: "all 0.2s",
              }}>
                {sending ? "جاري الإرسال..." : "تأكيد الاختيار"}
              </button>
            </div>

            <div style={{ textAlign: "center", color: "#1E2A36", fontSize: 11, marginTop: 20, letterSpacing: "0.06em" }}>
